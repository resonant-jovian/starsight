name: Chrome

# Daily regeneration of README chrome assets that carry live data:
#   - assets/status/panel-{light,dark}.svg              (downloads, dependents, updated_at)
#   - assets/hero/starsight-hero-{light,dark}.{svg,png} (meta strip + theme-matched thumbs;
#                                                        SVG canonical, 2× retina PNG sibling
#                                                        is what the README references)
#   - assets/roadmap-{light,dark}.svg                   (current milestone derived from version)
#   - assets/buttons/<name>-{light,dark}.svg            (version, license, coverage %)
#
# `cargo xtask chrome --live` also re-renders the dark example PNGs that feed
# the dark hero composite when their .rs source changed. The dual-format
# gallery / lorenz composites live outside `--live`; they're rebuilt by the
# developer-driven full regen (`cargo xtask chrome`).

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "xtask/src/chrome/**"
      - "xtask/Cargo.toml"
      - "Cargo.toml"
      # Coverage workflow rewrites this; chrome --live picks up the new % into
      # the codecov button so it doesn't lag a full day behind llvm-cov.
      - "assets/status/coverage.json"
  workflow_dispatch:

concurrency:
  group: chrome
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  chrome:
    name: regen live chrome
    runs-on: ubuntu-latest
    # Cold-cache run: ~13 min build + ~17 min for 68 examples + svgo + chrome
    # composition. 30 min was just barely too tight; 60 leaves headroom.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # SSH deploy key (write-capable, in bypass_actors of Main branch
          # protection). GITHUB_TOKEN is blocked by required_signatures + PR
          # rules; the deploy key bypasses both.
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate live chrome assets (light + dark)
        run: cargo run -p xtask --release -- chrome --live
      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/ examples/; then
            echo "no chrome changes"
            exit 0
          fi
          git config user.name  "starsight-bot"
          git config user.email "noreply@github.com"
          git add assets/status/ assets/hero/ assets/roadmap-light.svg assets/roadmap-dark.svg
          git add assets/buttons/
          git add examples/basics/*_dark.png examples/scientific/*_dark.png 2>/dev/null || true
          git commit -m "chore(chrome): regen live assets [skip ci]"
          git push
