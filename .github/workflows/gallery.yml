name: Gallery

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "starsight/**"
      - "starsight-layer-1/**"
      - "starsight-layer-2/**"
      - "starsight-layer-3/**"
      - "starsight-layer-4/**"
      - "starsight-layer-5/**"
      - "starsight-layer-6/**"
      - "starsight-layer-7/**"
      - "xtask/**"
  workflow_dispatch:

concurrency:
  group: gallery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  gallery:
    name: render gallery
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask gallery
      - name: Upload gallery
        uses: actions/upload-artifact@v4
        with:
          name: gallery
          path: target/gallery/
          if-no-files-found: warn
          retention-days: 14
