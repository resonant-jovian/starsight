name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel stale runs on the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Fast lint pass ───────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (pedantic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  # ── Compile checks ───────────────────────────────────────────────────────────
  check-msrv:
    name: cargo check (MSRV 1.89)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Pinned to the exact MSRV declared in [workspace.package].rust-version.
      # If you bump rust-version in Cargo.toml, bump this and the test matrix below.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  check-stable:
    name: cargo check (stable, all-features)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --locked

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: test (${{ matrix.rust }} on ${{ matrix.os }})
    needs: [check-msrv, check-stable]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  test-all-features:
    name: test --all-features
    needs: [check-stable]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked

  test-minimal:
    name: test --no-default-features
    needs: [check-stable]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features --locked

  # ── Docs ─────────────────────────────────────────────────────────────────────
  docs:
    name: cargo doc (-D missing-docs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: "-D missing-docs -D rustdoc::broken-intra-doc-links"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features --locked

  # ── Supply chain ─────────────────────────────────────────────────────────────
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # ── Aggregate gate (use this name in branch protection) ──────────────────────
  ci-success:
    name: ci-success
    if: always()
    needs:
      - fmt
      - clippy
      - check-msrv
      - check-stable
      - test
      - test-all-features
      - test-minimal
      - docs
      - deny
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All required CI jobs passed."

  # ── Disabled until features land ─────────────────────────────────────────────
