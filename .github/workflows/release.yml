name: Release

on:
  push:
    # Continuous publish-readiness check: every push to main runs the same
    # workflow but with `dry-run` hard-forced (see verify step below) so we
    # find publish-blockers (e.g. unpublishable Cargo.toml metadata, missing
    # docs, unsatisfiable deps) without waiting for a release.
    branches: [main]
  workflow_dispatch:
    # Real release path: only ever triggered manually with `dry-run` unchecked.
    # Tag pushes deliberately do NOT trigger this workflow — publishes are an
    # explicit human action, never an automatic side-effect of pushing a tag.
    inputs:
      dry-run:
        description: "Validate everything but don't actually publish or create the release."
        type: boolean
        default: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Pre-flight: read workspace version, decide dry-run mode ─────────────────
  verify:
    name: verify Cargo.toml version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      dry-run: ${{ steps.read.outputs.dry-run }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          # Workspace version
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          tag="$version"
          # Two trigger shapes:
          #   1. push to main      → continuous dry-run, never publishes
          #   2. workflow_dispatch → dry-run flag from input, default true
          # A real publish requires manual dispatch with dry-run=false.
          case "${{ github.event_name }}" in
            workflow_dispatch)
              dry_run="${{ github.event.inputs.dry-run || 'true' }}"
              ;;
            *)
              dry_run="true"
              ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "dry-run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "Releasing v$version (dry-run: $dry_run)"

  # ── Sanity: full CI must succeed before we publish anything ──────────────────
  pre-publish-check:
    name: pre-publish workspace check
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo doc --workspace --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: "-D missing-docs -D rustdoc::broken-intra-doc-links"
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # ── Publish to crates.io in dependency order ─────────────────────────────────
  publish:
    name: cargo publish (bottom-up)
    needs: [verify, pre-publish-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ needs.verify.outputs.dry-run }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::Dry-run mode — nothing will be uploaded to crates.io"
            # Cargo resolves workspace publish order itself; nothing is uploaded
            # so we don't need the bottom-up loop or the inter-crate sleep.
            cargo publish --workspace --locked --dry-run
          else
            # Real publish: bottom-up so each layer is on crates.io before the
            # layer above it tries to resolve it. See .spec/STARSIGHT.md
            # § "Crate dependency graph" for the rule.
            for crate in \
              starsight-layer-1 \
              starsight-layer-2 \
              starsight-layer-3 \
              starsight-layer-4 \
              starsight-layer-5 \
              starsight-layer-6 \
              starsight-layer-7 \
              starsight; do
              echo "::group::cargo publish -p $crate"
              cargo publish -p "$crate" --locked
              echo "::endgroup::"
              # Crates.io needs a moment to register the new version before
              # the next crate that depends on it can resolve it.
              sleep 30
            done
          fi

  # ── Generate release notes from the CHANGELOG and create the GitHub release ──
  github-release:
    name: GitHub release
    needs: [verify, publish]
    if: needs.verify.outputs.dry-run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes from CHANGELOG.md
        id: notes
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true
      - name: Fallback to CHANGELOG section
        if: steps.notes.outcome != 'success'
        run: |
          # If git-cliff isn't configured, just paste the [Unreleased] section.
          awk '/^## /{n++} n==1' CHANGELOG.md > RELEASE_NOTES.md || true
          echo "Generated fallback release notes from CHANGELOG.md"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.changelog || 'RELEASE_NOTES.md' }}
          tag_name: v${{ needs.verify.outputs.version }}
          name: starsight v${{ needs.verify.outputs.version }}
          draft: false
          prerelease: ${{ startsWith(needs.verify.outputs.version, '0.') }}
          generate_release_notes: false
