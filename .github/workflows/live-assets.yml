name: Live Assets

# Coverage and chrome regen previously lived in separate workflows that both
# ran on push-to-main and raced for the main ref:
#   - Coverage (~5 min):  writes assets/status/coverage.json, pushes
#   - Chrome   (~30 min): regenerates panel/buttons/hero/dark-PNGs, pushes
# Whichever finished second got "rejected: not a fast-forward" against the
# other bot's commit. Merging into one workflow with a sequential
# coverage → chrome chain (via `needs:`) eliminates the bot-vs-bot race; the
# rebase-retry on each push handles the rare external-push race.

on:
  push:
    branches: [main]
  schedule:
    # Daily refresh of buttons/panel/hero so chrome reflects current download
    # counts and license/coverage values even on quiet days.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: live-assets
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Coverage first: writes assets/status/coverage.json so chrome's --live
  # status panel + codecov button render the freshest line-coverage %. ─────────
  coverage:
    name: cargo llvm-cov → coverage.json
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # SSH deploy key (write-capable, in bypass_actors of Main branch
          # protection). GITHUB_TOKEN is blocked by required_signatures + PR
          # rules; the deploy key bypasses both.
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate LCOV report
        # `xtask` is internal tooling (rendering chrome PNGs / running gallery
        # build) — its coverage isn't meaningful for the library surface, and
        # llvm-cov on `xtask` slows the run without changing what users see.
        run: cargo llvm-cov --workspace --all-features --locked --exclude xtask --lcov --output-path lcov.info
      - name: Generate JSON summary for status panel
        # The chrome status panel embeds the coverage % alongside crates.io
        # downloads / dependents. The chrome job below reads
        # `assets/status/coverage.json` (single number) on its regen.
        run: cargo llvm-cov report --json --output-path coverage-summary.json
      - name: Extract line-coverage % into assets/status/coverage.json
        run: |
          mkdir -p assets/status
          line_pct=$(jq '.data[0].totals.lines.percent' coverage-summary.json)
          printf '{"coverage": %s}\n' "$line_pct" > assets/status/coverage.json
          echo "wrote assets/status/coverage.json: $(cat assets/status/coverage.json)"
      - name: Commit coverage.json if changed
        # Fast-path: skip if the file is bit-identical to main.
        run: |
          if [[ -z "$(git status --porcelain assets/status/coverage.json)" ]]; then
            echo "coverage.json unchanged; skipping commit"
            exit 0
          fi
          git config user.name  "starsight-bot"
          git config user.email "starsight-bot@users.noreply.github.com"
          git add assets/status/coverage.json
          git commit -m "chore(status): refresh coverage.json from llvm-cov"
          # External pushes (e.g. developer commits to main) can land between
          # our checkout and our push; rebase-retry up to 3 times before
          # giving up and surfacing a hard failure.
          attempts=0
          until git push; do
            attempts=$((attempts + 1))
            if (( attempts >= 3 )); then
              echo "::error::coverage push failed after $attempts rebase attempts"
              exit 1
            fi
            echo "::warning::push rejected (attempt $attempts) — rebasing on origin/main"
            git fetch origin main
            git rebase origin/main
          done
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 30

  # ── Chrome runs after coverage so the status panel embeds the fresh
  # coverage % instead of a value one cycle stale. `needs: coverage` makes
  # the in-workflow chrome-vs-coverage push race structurally impossible. ─────
  chrome:
    name: regen live chrome
    needs: coverage
    runs-on: ubuntu-latest
    # Cold-cache run: ~13 min build + ~17 min for 68 examples + svgo + chrome
    # composition. 30 min was just barely too tight; 60 leaves headroom.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Re-fetch HEAD so we include coverage's just-pushed commit if any.
          # Without `ref: main`, actions/checkout would default to the workflow
          # trigger's ref, which is the pre-coverage commit on push events.
          ref: main
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate live chrome assets (light + dark)
        run: cargo run -p xtask --release -- chrome --live
      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/ examples/; then
            echo "no chrome changes"
            exit 0
          fi
          git config user.name  "starsight-bot"
          git config user.email "noreply@github.com"
          git add assets/status/ assets/hero/ assets/roadmap-light.svg assets/roadmap-dark.svg
          git add assets/buttons/
          git add examples/basics/*_dark.png examples/scientific/*_dark.png 2>/dev/null || true
          git commit -m "chore(chrome): regen live assets [skip ci]"
          # Same rebase-retry as coverage, against the wider 30-min external
          # push window.
          attempts=0
          until git push; do
            attempts=$((attempts + 1))
            if (( attempts >= 3 )); then
              echo "::error::chrome push failed after $attempts rebase attempts"
              exit 1
            fi
            echo "::warning::push rejected (attempt $attempts) — rebasing on origin/main"
            git fetch origin main
            git rebase origin/main
          done
