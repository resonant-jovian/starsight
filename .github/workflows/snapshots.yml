name: Snapshots

on:
  push:
    branches: [main]
    paths:
      - "starsight-layer-1/**"
      - "starsight-layer-2/**"
      - "starsight-layer-3/**"
      - "starsight-layer-4/**"
      - "starsight-layer-5/**"
      - "starsight-layer-6/**"
      - "starsight-layer-7/**"
      - "starsight/**"
  pull_request:
    paths:
      - "starsight-layer-1/**"
      - "starsight-layer-2/**"
      - "starsight-layer-3/**"
      - "starsight-layer-4/**"
      - "starsight-layer-5/**"
      - "starsight-layer-6/**"
      - "starsight-layer-7/**"
      - "starsight/**"
  workflow_dispatch:

concurrency:
  group: snapshots-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  snapshots:
    name: insta snapshot tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Use the prebuilt binary instead of `cargo install` to save 1-2 minutes.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-insta
      # cargo-insta has no way to forward `--locked` to its internal cargo
      # invocation: putting `--locked` before `--` is rejected by cargo-insta's
      # own parser, and putting it after `--` forwards it to the test binary
      # (libtest), which also doesn't recognize it. Workaround: pre-build the
      # test binaries with `--locked` (which both verifies the lockfile *and*
      # produces the artifacts), then run `cargo insta test` against the
      # already-built binaries with `CARGO_NET_OFFLINE=true` so it can never
      # silently re-resolve.
      - name: Verify lockfile and pre-build test binaries
        run: cargo test --workspace --no-run --locked
      - name: Run snapshot tests
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo insta test --workspace --check --unreferenced reject
      - name: Upload mismatched snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: |
            **/snapshots/*.snap.new
            **/snapshots/*.snap.new.png
          if-no-files-found: ignore
          retention-days: 14
