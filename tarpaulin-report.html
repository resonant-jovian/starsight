e chosen by the Wilkinson Extended algorithm.\n    pub fn auto_from_data(values: \u0026[f64], target_ticks: usize) -\u003e Option\u003cSelf\u003e {\n        let dmin = values.iter().copied().fold(f64::INFINITY, f64::min);\n        let dmax = values.iter().copied().fold(f64::NEG_INFINITY, f64::max);\n        let ticks = crate::ticks::wilkinson_extended(dmin, dmax, target_ticks, true);\n        let labels: Vec\u003cString\u003e = ticks.iter().map(|t| format!(\"{t}\")).collect();\n        Some(Self {\n            scale: LinearScale {\n                domain_min: ticks[0],\n                domain_max: *ticks.last()?,\n            },\n            label: None,\n            tick_positions: ticks,\n            tick_labels: labels,\n        })\n    }\n}\n","traces":[{"line":21,"address":[6980846,6980144],"length":1,"stats":{"Line":7}},{"line":24,"address":[6980540],"length":1,"stats":{"Line":7}},{"line":25,"address":[6913325,6913277,6913375],"length":1,"stats":{"Line":13}},{"line":26,"address":[6980693],"length":1,"stats":{"Line":8}},{"line":28,"address":[6980642],"length":1,"stats":{"Line":8}},{"line":29,"address":[6980622,6980646],"length":1,"stats":{"Line":14}},{"line":32,"address":[6980650],"length":1,"stats":{"Line":8}},{"line":33,"address":[6980671],"length":1,"stats":{"Line":7}}],"covered":8,"coverable":8},{"path":["/","home","albin","Documents","starsight","starsight-layer-2","src","coords.rs"],"content":"//! Coordinate systems: convert data values to pixel positions.\n//!\n//! [`CartesianCoord`] bundles an x-axis, a y-axis, and the plot-area rectangle.\n//! `data_to_pixel` maps a `(data_x, data_y)` pair to screen coordinates,\n//! inverting the y-axis (data y up → pixel y down).\n\n#![allow(clippy::cast_possible_truncation)]\n\nuse crate::axes::Axis;\nuse crate::scales::Scale;\nuse starsight_layer_1::primitives::{Point, Rect};\n\n// ── CartesianCoord ───────────────────────────────────────────────────────────────────────────────\n\n/// 2D Cartesian coordinate system: x-axis, y-axis, and a pixel-space plot rect.\npub struct CartesianCoord {\n    /// X-axis (horizontal).\n    pub x_axis: Axis,\n    /// Y-axis (vertical).\n    pub y_axis: Axis,\n    /// Pixel rectangle the data is mapped into.\n    pub plot_area: Rect,\n}\n\nimpl CartesianCoord {\n    /// Map a single data-space x value to a pixel-space x coordinate.\n    #[must_use]\n    pub fn map_x(\u0026self, x: f64) -\u003e f64 {\n        let nx = self.x_axis.scale.map(x);\n        f64::from(self.plot_area.left) + nx * f64::from(self.plot_area.width())\n    }\n\n    /// Map a single data-space y value to a pixel-space y coordinate. The y axis\n    /// is inverted: a larger data-y becomes a smaller pixel-y (closer to the top).\n    #[must_use]\n    pub fn map_y(\u0026self, y: f64) -\u003e f64 {\n        let ny = self.y_axis.scale.map(y);\n        f64::from(self.plot_area.bottom) - ny * f64::from(self.plot_area.height())\n    }\n\n    /// Map a data-space point to a pixel-space `Point`.\n    #[must_use]\n    pub fn data_to_pixel(\u0026self, x: f64, y: f64) -\u003e Point {\n        Point::new(self.map_x(x) as f32, self.map_y(y) as f32)\n    }\n}\n\n// ── PolarCoord ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct PolarCoord { pub center: Point, pub radius: f32, pub theta_axis: Axis, pub r_axis: Axis }\n","traces":[{"line":28,"address":[6986320],"length":1,"stats":{"Line":2}},{"line":30,"address":[6986145,6986120,6986388,6986413,6986158,6986423],"length":1,"stats":{"Line":14}},{"line":36,"address":[6986448],"length":1,"stats":{"Line":4}},{"line":38,"address":[6986246,6986277,6986264,6986522,6986547,6986560],"length":1,"stats":{"Line":18}},{"line":43,"address":[6986032],"length":1,"stats":{"Line":2}},{"line":44,"address":[6986170,6986293],"length":1,"stats":{"Line":4}}],"covered":6,"coverable":6},{"path":["/","home","albin","Documents","starsight","starsight-layer-2","src","lib.rs"],"content":"//! Layer 2 — scales, ticks, axes, and coordinate systems.\n//!\n//! Bridges raw data values and the pixel-space rendering primitives in\n//! [`starsight_layer_1`]. Each module is single-purpose:\n//!\n//! - [`scales`]: map data domain → normalized `[0, 1]`.\n//! - [`ticks`]: choose nice tick positions (Wilkinson Extended algorithm).\n//! - [`axes`]: bundle a scale with ticks and labels.\n//! - [`coords`]: convert data values to pixel positions.\n\n#![allow(\n    clippy::cast_possible_truncation,\n    clippy::cast_sign_loss,\n    clippy::cast_precision_loss,\n    clippy::many_single_char_names\n)]\n\npub mod axes;\npub mod coords;\npub mod scales;\npub mod ticks;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-2","src","scales.rs"],"content":"//! Scales: map data values onto normalized `[0, 1]` ranges.\n//!\n//! Every scale implements the [`Scale`] trait. The simplest is [`LinearScale`];\n//! later milestones add `LogScale`, `SymLogScale`, `BandScale`, `DateTimeScale`.\n\n// ── Scale ────────────────────────────────────────────────────────────────────────────────────────\n\n/// A monotonic mapping from a data domain to the normalized `[0, 1]` range.\npub trait Scale {\n    /// Map a data value to its normalized position.\n    fn map(\u0026self, value: f64) -\u003e f64;\n    /// Inverse: map a normalized position back to data space.\n    fn inverse(\u0026self, normalized: f64) -\u003e f64;\n}\n\n// ── LinearScale ──────────────────────────────────────────────────────────────────────────────────\n\n/// Linear (`y = ax + b`) mapping.\npub struct LinearScale {\n    /// Lower bound of the data domain.\n    pub domain_min: f64,\n    /// Upper bound of the data domain.\n    pub domain_max: f64,\n}\n\nimpl Scale for LinearScale {\n    fn map(\u0026self, value: f64) -\u003e f64 {\n        if (self.domain_max - self.domain_min).abs() \u003c f64::EPSILON {\n            return 0.5;\n        }\n        (value - self.domain_min) / (self.domain_max - self.domain_min)\n    }\n\n    fn inverse(\u0026self, normalized: f64) -\u003e f64 {\n        normalized * (self.domain_max - self.domain_min) + self.domain_min\n    }\n}\n\n// ── LogScale ─────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.2.0): pub struct LogScale { pub domain_min: f64, pub domain_max: f64, pub base: f64 }\n\n// ── SymLogScale ──────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct SymLogScale { pub domain_min: f64, pub domain_max: f64, pub linthresh: f64 }\n\n// ── BandScale ────────────────────────────────────────────────────────────────────────────────────\n\n/// Scale for categorical (band) data: maps each unique category to a band position.\n///\n/// Used for bar charts and categorical x-axes.\n#[derive(Debug, Clone)]\npub struct BandScale {\n    /// Unique category values in order.\n    pub categories: Vec\u003cString\u003e,\n    /// Padding inside each band as a fraction (0.0 to 1.0). Default 0.2.\n    pub padding: f64,\n    /// Whether to center the band at 0.5 (default true).\n    pub align: InteriorAlign,\n}\n\nimpl BandScale {\n    /// Create a new band scale from category labels.\n    #[must_use]\n    pub fn new(categories: Vec\u003cString\u003e) -\u003e Self {\n        Self {\n            categories,\n            padding: 0.2,\n            align: InteriorAlign::Middle,\n        }\n    }\n\n    /// Set the padding fraction.\n    #[must_use]\n    pub fn padding(mut self, p: f64) -\u003e Self {\n        self.padding = p.clamp(0.0, 1.0);\n        self\n    }\n\n    /// Bandwidth as a fraction of the full band width.\n    #[must_use]\n    pub fn bandwidth(\u0026self) -\u003e f64 {\n        1.0 - self.padding\n    }\n\n    /// Map a category to its normalized position (0 to 1).\n    #[must_use]\n    #[allow(clippy::cast_precision_loss, clippy::cast_sign_loss)]\n    pub fn map(\u0026self, category: \u0026str) -\u003e f64 {\n        if self.categories.is_empty() {\n            return 0.5;\n        }\n        let idx = self.categories.iter().position(|c| c == category);\n        if let Some(i) = idx {\n            let n = self.categories.len() as f64;\n            (i as f64 + 0.5) / n\n        } else {\n            0.5\n        }\n    }\n\n    /// Get the extent of a single band in normalized coordinates.\n    #[must_use]\n    pub fn band_extent(\u0026self) -\u003e (f64, f64) {\n        let bw = self.bandwidth();\n        let half = bw / 2.0;\n        (0.5 - half, 0.5 + half)\n    }\n}\n\nimpl Scale for BandScale {\n    fn map(\u0026self, value: f64) -\u003e f64 {\n        if self.categories.is_empty() {\n            return 0.5;\n        }\n        let idx = value.floor() as usize;\n        if idx \u003e= self.categories.len() {\n            return 0.5;\n        }\n        let n = self.categories.len() as f64;\n        (idx as f64 + 0.5) / n\n    }\n\n    fn inverse(\u0026self, normalized: f64) -\u003e f64 {\n        if normalized \u003c= 0.0 || normalized \u003e= 1.0 || self.categories.is_empty() {\n            return 0.0;\n        }\n        let n = self.categories.len() as f64;\n        (normalized * n - 0.5).floor().max(0.0).min(n - 1.0)\n    }\n}\n\n/// Alignment within the band.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]\npub enum InteriorAlign {\n    #[default]\n    Middle,\n    Left,\n    Right,\n}\n\n// ── DateTimeScale ────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct DateTimeScale { pub domain: (Timestamp, Timestamp) }\n","traces":[{"line":28,"address":[6912326,6912148,6912460,6912050,6912420,6912180,6912016,6912292],"length":1,"stats":{"Line":30}},{"line":35,"address":[6987072],"length":1,"stats":{"Line":0}},{"line":63,"address":[6986880],"length":1,"stats":{"Line":0}},{"line":73,"address":[6986928],"length":1,"stats":{"Line":0}},{"line":74,"address":[6986951],"length":1,"stats":{"Line":0}},{"line":75,"address":[698  = [0.25, 0.2, 0.5, 0.05];\n\n// ── wilkinson_extended ───────────────────────────────────────────────────────────────────────────\n\n/// Compute optimal tick positions for the data range `[dmin, dmax]`, targeting\n/// roughly `m` ticks. When `only_loose` is true the chosen labels strictly bracket\n/// the data; otherwise tighter ranges are also accepted.\n#[must_use]\npub fn wilkinson_extended(mut dmin: f64, mut dmax: f64, m: usize, only_loose: bool) -\u003e Vec\u003cf64\u003e {\n    let eps = f64::EPSILON * 100.0;\n\n    if dmin \u003e dmax {\n        std::mem::swap(\u0026mut dmin, \u0026mut dmax);\n    }\n\n    if dmax - dmin \u003c eps || (dmax - dmin) \u003e f64::MAX.sqrt() {\n        return linspace(dmin, dmax, m);\n    }\n\n    let mut best_score = -2.0_f64;\n    let mut best_lmin = 0.0;\n    let mut best_lmax = 0.0;\n    let mut best_lstep = 0.0;\n\n    let mut j = 1.0;\n    'outer: loop {\n        for \u0026q in \u0026Q {\n            let Some(sm) = simplicity_max(q, j) else {\n                continue;\n            };\n\n            if W[0] * sm + W[1] + W[2] + W[3] \u003c best_score {\n                break 'outer;\n            }\n\n            let mut k = 2.0;\n            loop {\n                let dm = density_max(k, m as f64);\n\n                if W[0] * sm + W[1] + W[2] * dm + W[3] \u003c best_score {\n                    break;\n                }\n\n                let delta = (dmax - dmin) / (k + 1.0) / j / q;\n                let mut z = delta.log10().ceil() as i32;\n\n                loop {\n                    let step = j * q * 10.0_f64.powi(z);\n                    let cm = coverage_max(dmin, dmax, step * (k - 1.0));\n\n                    if W[0] * sm + W[1] * cm + W[2] * dm + W[3] \u003c best_score {\n                        break;\n                    }\n\n                    let min_start =\n                        (dmax / step).floor() as i64 * j as i64 - (k as i64 - 1) * j as i64;\n                    let max_start = (dmin / step).ceil() as i64 * j as i64;\n\n                    if min_start \u003e max_start {\n                        z += 1;\n                        continue;\n                    }\n\n                    for start in min_start..=max_start {\n                        let lmin = start as f64 * (step / j);\n                        let lmax = lmin + step * (k - 1.0);\n                        let lstep = step;\n\n                        let Some(s) = simplicity(q, j, lmin, lmax, lstep) else {\n                            continue;\n                        };\n                        let c = coverage(dmin, dmax, lmin, lmax);\n                        let g = density(k, m as f64, dmin, dmax, lmin, lmax);\n                        let l = 1.0; // legibility\n\n                        let score = W[0] * s + W[1] * c + W[2] * g + W[3] * l;\n\n                        if score \u003e best_score \u0026\u0026 (!only_loose || (lmin \u003c= dmin \u0026\u0026 lmax \u003e= dmax)) {\n                            best_score = score;\n                            best_lmin = lmin;\n                            best_lmax = lmax;\n                            best_lstep = lstep;\n                        }\n                    }\n\n                    z += 1;\n                }\n\n                k += 1.0;\n            }\n        }\n\n        j += 1.0;\n    }\n\n    linspace_step(best_lmin, best_lmax, best_lstep)\n}\n\n// ── helpers ──────────────────────────────────────────────────────────────────────────────────────\n\nfn linspace(from: f64, to: f64, n: usize) -\u003e Vec\u003cf64\u003e {\n    if n \u003c= 1 || (to - from).abs() \u003c f64::EPSILON {\n        return vec![from];\n    }\n    let step = (to - from) / (n - 1) as f64;\n    (0..n).map(|i| from + i as f64 * step).collect()\n}\n\nfn linspace_step(from: f64, to: f64, step: f64) -\u003e Vec\u003cf64\u003e {\n    let n = ((to - from) / step).round() as usize + 1;\n    (0..n).map(|i| from + i as f64 * step).collect()\n}\n\nfn simplicity(q: f64, j: f64, lmin: f64, lmax: f64, lstep: f64) -\u003e Option\u003cf64\u003e {\n    let eps = f64::EPSILON;\n    let n = Q.len();\n    let i = Q.iter().position(|\u0026x| x == q)?;\n    let v = if (lmin % lstep \u003c eps || lstep - (lmin % lstep) \u003c lstep) \u0026\u0026 lmin \u003c= 0.0 \u0026\u0026 lmax \u003e= 0.0\n    {\n        1.0\n    } else {\n        0.0\n    };\n    Some(1. - (i as f64 - 1.) / (n as f64 - 1.) - j + v)\n}\n\nfn simplicity_max(q: f64, j: f64) -\u003e Option\u003cf64\u003e {\n    let n = Q.len();\n    let i = Q.iter().position(|\u0026x| x == q)?;\n    let v = 1.;\n    Some(1. - (i as f64 - 1.) / (n as f64 - 1.) - j + v)\n}\n\nfn coverage(dmin: f64, dmax: f64, lmin: f64, lmax: f64) -\u003e f64 {\n    let range = dmax - dmin;\n    1. - 0.5 * ((dmax - lmax).powi(2) + (dmin - lmin).powi(2)) / ((0.1 * range).powi(2))\n}\n\nfn coverage_max(dmin: f64, dmax: f64, span: f64) -\u003e f64 {\n    let range = dmax - dmin;\n    if span \u003e range {\n        let half = (span - range) / 2.;\n        1. - 0.5 * (half.powi(2) + half.powi(2)) / ((0.1 * range).powi(2))\n    } else {\n        1.\n    }\n}\n\nfn density(k: f64, m: f64, dmin: f64, dmax: f64, lmin: f64, lmax: f64) -\u003e f64 {\n    let r = (k - 1.) / (lmax - lmin);\n    let rt = (m - 1.) / (lmax.max(dmax) - dmin.min(lmin));\n    2. - (r / rt).max(rt / r)\n}\n\nfn density_max(k: f64, m: f64) -\u003e f64 {\n    if k \u003e= m { 2. - (k - 1.) / (m - 1.) } else { 1. }\n}\n\n// ── tests ────────────────────────────────────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::wilkinson_extended;\n\n    #[test]\n    fn ticks_0_to_100() {\n        let ticks = wilkinson_extended(0.0, 100.0, 5, true);\n        assert!(!ticks.is_empty());\n        assert!(ticks[0] \u003c= 0.0);\n        assert!(*ticks.last().unwrap() \u003e= 100.0);\n    }\n\n    #[test]\n    fn ticks_0_to_1() {\n        let ticks = wilkinson_extended(0.0, 1.0, 5, true);\n        assert!(!ticks.is_empty());\n        let step = ticks[1] - ticks[0];\n        assert!(step \u003e 0.0 \u0026\u0026 step \u003c= 0.5);\n    }\n\n    #[test]\n    fn ticks_negative_range() {\n        let ticks = wilkinson_extended(-50.0, 50.0, 5, true);\n        assert!(ticks[0] \u003c= -50.0);\n        assert!(*ticks.last().unwrap() \u003e= 50.0);\n    }\n\n    #[test]\n    fn ticks_zero_width() {\n        let ticks = wilkinson_extended(42.0, 42.0, 5, true);\n        assert_eq!(ticks, vec![42.0]);\n    }\n}\n\nuse proptest::prelude::*;\nproptest! {\n    #[test]\n    fn ticks_monotonic(min in -1e6f64..0.0, max in 0.1f64..1e6) {\n        let ticks = wilkinson_extended(min, max, 5, true);\n        for pair in ticks.windows(2) {\n            prop_assert!(pair[0] \u003c pair[1], \"ticks not monotonic: {:?}\", ticks);\n        }\n    }\n}\n","traces":[{"line":24,"address":[6982528],"length":1,"stats":{"Line":11}},{"line":27,"address":[8355514],"length":1,"stats":{"Line":11}},{"line":28,"address":[6908554],"length":1,"stats":{"Line":0}},{"line":31,"address":[6587872],"length":1,"stats":{"Line":11}},{"line":42,"address":[8355902,8355812],"length":1,"stats":{"Line":22}},{"line":43,"address":[6909164,6908918],"length":1,"stats":{"Line":11}},{"line":47,"address":[6909172],"length":1,"stats":{"Line":11}},{"line":55,"address":[8356218,8356376,8356419],"length":1,"stats":{"Line":25}},{"line":59,"address":[6983562],"length":1,"stats":{"Line":11}},{"line":60,"address":[6983617],"length":1,"stats":{"Line":11}},{"line":62,"address":[6985139],"length":1,"stats":{"Line":11}},{"line":63,"address":[8356737],"length":1,"stats":{"Line":11}},{"line":64,"address":[6983814],"length":1,"stats":{"Line":11}},{"line":66,"address":[6589189,6589206],"length":1,"stats":{"Line":16}},{"line":70,"address":[6985640,6983969,6985614,6983981],"length":1,"stats":{"Line":16}},{"line":72,"address":[8357007,8357019,8358571],"length":1,"stats":{"Line":18}},{"line":74,"address":[8357060],"length":1,"stats":{"Line":9}},{"line":75,"address" },{"line":171,"address":[6983385,6983445],"length":1,"stats":{"Line":14}},{"line":211,"address":[6591289],"length":1,"stats":{"Line":1}},{"line":213,"address":[6633711],"length":1,"stats":{"Line":1}},{"line":214,"address":[6633724],"length":1,"stats":{"Line":1}},{"line":215,"address":[6633752,6633764],"length":1,"stats":{"Line":2}},{"line":216,"address":[6633769,6634243,6634065,6633933],"length":1,"stats":{"Line":1}}],"covered":49,"coverable":53},{"path":["/","home","albin","Documents","starsight","starsight-layer-2","tests","snapshot.rs"],"content":"\n","traces":[{"line":1,"address":[390631,390624],"length":1,"stats":{"Line":2}}],"covered":1,"coverable":1},{"path":["/","home","albin","Documents","starsight","starsight-layer-3","src","aesthetics.rs"],"content":"//! Aesthetic mappings: how data columns become visual properties.\n//!\n//! In the grammar of graphics, an aesthetic binds a data column to a visual\n//! channel (color, size, shape, alpha, fill, linetype). The aesthetic resolves\n//! discrete categories into concrete values.\n//!\n//! Status: stub. Implementations land in 0.3.0+.\n\n// ── Aesthetic ────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub trait Aesthetic { type Output; fn resolve(\u0026self, data: \u0026[f64]) -\u003e Vec\u003cSelf::Output\u003e; }\n\n// ── ColorAesthetic ───────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct ColorAesthetic { palette: Vec\u003cColor\u003e, mapping: Mapping }\n\n// ── SizeAesthetic ────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct SizeAesthetic { range: (f32, f32), mapping: Mapping }\n\n// ── ShapeAesthetic ───────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct ShapeAesthetic { shapes: Vec\u003cShape\u003e }\n\n// ── AlphaAesthetic ───────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct AlphaAesthetic { range: (f32, f32) }\n\n// ── FillAesthetic ────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct FillAesthetic { palette: Vec\u003cColor\u003e }\n\n// ── LinetypeAesthetic ────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct LinetypeAesthetic { types: Vec\u003cLinetype\u003e }\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-3","src","lib.rs"],"content":"//! Layer 3 — marks, statistics, aesthetics, position adjustments.\n//!\n//! Layer 3 is the visual vocabulary of the library. Marks are the geometric\n//! shapes that read data and draw it. Statistics are data transforms (binning,\n//! KDE, regression, ...). Aesthetics map data columns to visual properties.\n//! Position adjustments resolve overlapping marks (stack, dodge, jitter).\n\n#![allow(\n    clippy::cast_possible_truncation,\n    clippy::cast_sign_loss,\n    clippy::cast_precision_loss\n)]\n\n//! Modules:\n//! - [`marks`]: `Mark` trait + `LineMark`, `PointMark`, `BarMark`, ...\n//! - [`statistics`]: data transforms (stub).\n//! - [`aesthetics`]: aesthetic mapping types (stub).\n//! - [`positions`]: position adjustments (stub).\n\npub mod aesthetics;\npub mod marks;\npub mod positions;\npub mod statistics;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-3","src","marks.rs"],"content":"//! Marks: visual elements that read data and render onto a backend.\n//!\n//! Every mark implements the [`Mark`] trait. Concrete mark types share the same\n//! `*Mark` suffix convention. Adding a new chart type means adding a new struct\n//! to this file with its own `// ── ItemName ─────` section.\n//!\n//! Status:\n//! - 0.1.0: `Mark` trait, `LineMark`, `PointMark`.\n//! - 0.2.0: `BarMark`, `AreaMark`.\n//! - 0.3.0+: `HeatmapMark`, `BoxMark`, `ViolinMark`, `PieMark`, `ContourMark`,\n//!   `RidgeMark`, `StepMark`, `ErrorBarMark`, `RugMark`.\n\nuse crate::statistics::{Bin, BinMethod, BinTransform};\nuse starsight_layer_1::backends::DrawBackend;\nuse starsight_layer_1::errors::Result;\nuse starsight_layer_1::paths::{LineCap, LineJoin, Path, PathCommand, PathStyle};\nuse starsight_layer_1::primitives::{Color, Point, Rect};\nuse starsight_layer_2::coords::CartesianCoord;\nuse starsight_layer_2::scales::Scale;\nuse std::collections::HashMap;\n// ── DataExtent ───────────────────────────────────────────────────────────────────────────────────\n\n/// Axis-aligned bounding box of a mark's data, in data coordinates.\npub struct DataExtent {\n    /// Minimum x value across the mark's data.\n    pub x_min: f64,\n    /// Maximum x value across the mark's data.\n    pub x_max: f64,\n    /// Minimum y value across the mark's data.\n    pub y_min: f64,\n    /// Maximum y value across the mark's data.\n    pub y_max: f64,\n}\n\n/// Context for bar rendering that enables grouped/stacked modes.\n#[derive(Debug, Default)]\npub struct BarRenderContext {\n    /// Cumulative baselines for stacked bars: category -\u003e baseline value.\n    pub stacked_baselines: HashMap\u003cString, f64\u003e,\n    /// Group offsets: `group_name` -\u003e (`group_index`, `total_groups`).\n    pub group_offsets: HashMap\u003cString, (i32, i32)\u003e,\n    /// Whether this is the first render pass (for computing baselines).\n    pub first_pass: bool,\n}\n\n// ── Mark ─────────────────────────────────────────────────────────────────────────────────────────\n\n/// Object-safe trait every visual mark implements.\n///\n/// `render` draws the mark using `coord` to map data values to pixel space and\n/// `backend` to issue draw calls. `data_extent` reports the mark's data range so\n/// the figure can compute appropriate scales.\npub trait Mark {\n    /// Render the mark via the given coordinate system and backend.\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e;\n    /// Render with bar context for grouped/stacked bar rendering.\n    #[allow(unused_variables)]\n    fn render_bar(\n        \u0026self,\n        coord: \u0026CartesianCoord,\n        backend: \u0026mut dyn DrawBackend,\n        _context: \u0026BarRenderContext,\n    ) -\u003e Result\u003c()\u003e {\n        self.render(coord, backend)\n    }\n    /// Check if this is a bar mark with group/stack info.\n    fn as_bar_info(\u0026self) -\u003e Option\u003c(Option\u003c\u0026str\u003e, Option\u003c\u0026str\u003e, Orientation)\u003e {\n        None\n    }\n    /// Get bar data for stacking calculations. Returns (labels, values).\n    fn as_bar_data(\u0026self) -\u003e Option\u003c(\u0026[String], \u0026[f64])\u003e {\n        None\n    }\n    /// Bounding box of this mark's data, or `None` if it is empty.\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e;\n}\n\n// ── LineMark ─────────────────────────────────────────────────────────────────────────────────────\n\n/// Connected line series with optional NaN gaps.\n#[derive(Debug, Clone)]\npub struct LineMark {\n    /// X data values.\n    pub x: Vec\u003cf64\u003e,\n    /// Y data values (must be the same length as `x`).\n    pub y: Vec\u003cf64\u003e,\n    /// Line color.\n    pub color: Color,\n    /// Stroke width in pixels.\n    pub width: f32,\n}\n\nimpl LineMark {\n    /// New line series from x and y data with default color and width.\n    #[must_use]\n    pub fn new(x: Vec\u003cf64\u003e, y: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            x,\n            y,\n            color: Color::BLUE,\n            width: 2.0,\n        }\n    }\n\n    /// Builder: set line color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.color = c;\n        self\n    }\n\n    /// Builder: set stroke width in pixels.\n    #[must_use]\n    pub fn width(mut self, w: f32) -\u003e Self {\n        self.width = w;\n        self\n    }\n}\n\nimpl Mark for LineMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let mut commands = Vec::new();\n        let mut need_move = true;\n\n        for (x, y) in self.x.iter().zip(\u0026self.y) {\n            if x.is_nan() || y.is_nan() {\n                need_move = true;\n                continue;\n            }\n            let p = coord.data_to_pixel(*x, *y);\n            if need_move {\n                commands.push(PathCommand::MoveTo(p));\n                need_move = false;\n            } else {\n                commands.push(PathCommand::LineTo(p));\n            }\n        }\n\n        if commands.is_empty() {\n            return Ok(());\n        }\n\n        let path = Path { commands };\n        let style = PathStyle {\n            stroke_color: self.color,\n            stroke_width: self.width,\n            fill_color: None,\n            line_cap: LineCap::Round,\n            line_join: LineJoin::Round,\n            ..PathStyle::default()\n        };\n        backend.draw_path(\u0026path, \u0026style)\n    }\n\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        extent_from_xy(\u0026self.x, \u0026self.y)\n    }\n}\n\n// ── PointMark ────────────────────────────────────────────────────────────────────────────────────\n\n/// Scatter plot of individual points.\n#[derive(Debug, Clone)]\npub struct PointMark {\n    /// X data values.\n    pub x: Vec\u003cf64\u003e,\n    /// Y data values (must be the same length as `x`).\n    pub y: Vec\u003cf64\u003e,\n    /// Point color.\n    pub color: Color,\n    /// Point radius in pixels.\n    pub radius: f32,\n}\n\nimpl PointMark {\n    /// New scatter from x and y data with default color and radius.\n    #[must_use]\n    pub fn new(x: Vec\u003cf64\u003e, y: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            x,\n            y,\n            color: Color::BLUE,\n            radius: 4.0,\n        }\n    }\n\n    /// Builder: set point color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.color = c;\n        self\n    }\n\n    /// Builder: set point radius in pixels.\n    #[must_use]\n    pub fn radius(mut self, r: f32) -\u003e Self {\n        self.radius = r;\n        self\n    }\n}\n\nimpl Mark for PointMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let mut commands = Vec::new();\n\n        for (x, y) in self.x.iter().zip(\u0026self.y) {\n            if x.is_nan() || y.is_nan() {\n                continue;\n            }\n            let center = coord.data_to_pixel(*x, *y);\n            push_circle(\u0026mut commands, center, self.radius);\n        }\n\n        if commands.is_empty() {\n            return Ok(());\n        }\n\n        let path = Path { commands };\n        let style = PathStyle {\n            stroke_color: self.color,\n            stroke_width: 0.0,\n            fill_color: Some(self.color),\n            ..PathStyle::default()\n        };\n        backend.draw_path(\u0026path, \u0026style)\n    }\n\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        extent_from_xy(\u0026self.x, \u0026self.y)\n    }\n}\n\n// ── BarMark ──────────────────────────────────────────────────────────────────────────────────────\n/// Bar chart for individual values\n#[derive(Debug, Clone)]\npub struct BarMark {\n    /// X category labels.\n    pub x: Vec\u003cString\u003e,\n    /// Y data height\n    pub y: Vec\u003cf64\u003e,\n    /// Bar color\n    pub color: Option\u003cColor\u003e,\n    /// Define the width of each bar\n    pub width: Option\u003cf32\u003e,\n    /// Set bar origin axis\n    pub orientation: Orientation,\n    /// Group name for grouped bars (dodged within band)\n    pub group: Option\u003cString\u003e,\n    /// Stack name for stacked bars (accumulated baseline)\n    pub stack: Option\u003cString\u003e,\n    /// Base value for waterfall chart (defaults to 0)\n    pub base: Option\u003cf64\u003e,\n}\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]\n#[non_exhaustive]\npub enum Orientation {\n    #[default]\n    Vertical,\n    Horizontal,\n}\nimpl BarMark {\n    /// New bar chart from x and y data with default color and bar width.\n    #[must_use]\n    pub fn new(x: Vec\u003cString\u003e, y: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            x,\n            y,\n            color: Some(Color::BLUE),\n            width: Some(0.8),\n            orientation: Orientation::Vertical,\n            group: None,\n            stack: None,\n            base: None,\n        }\n    }\n\n    pub fn horizontal(mut self) -\u003e Self {\n        self.orientation = Orientation::Horizontal;\n        self\n    }\n\n    /// Builder: set group name for grouped bars (bars are dodged within each band).\n    #[must_use]\n    pub fn group(mut self, name: impl Into\u003cString\u003e) -\u003e Self {\n        self.group = Some(name.into());\n        self\n    }\n\n    /// Builder: set stack name for stacked bars (bars are accumulated).\n    #[must_use]\n    pub fn stack(mut self, name: impl Into\u003cString\u003e) -\u003e Self {\n        self.stack = Some(name.into());\n        self\n    }\n\n    /// Builder: set base value for waterfall chart (where bar starts).\n    #[must_use]\n    pub fn base(mut self, b: f64) -\u003e Self {\n        self.base = Some(b);\n        self\n    }\n\n    /// Builder: set bar color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.color = Some(c);\n        self\n    }\n\n    /// Builder: set bar width in pixels.\n    #[must_use]\n    pub fn width(mut self, r: f32) -\u003e Self {\n        self.width = Some(r);\n        self\n    }\n}\nimpl Mark for BarMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let valid: Vec\u003c(\u0026str, f64)\u003e = self\n            .x\n            .iter()\n            .zip(\u0026self.y)\n            .filter(|(x, y)| !x.is_empty() \u0026\u0026 !y.is_nan())\n            .map(|(x, y)| (x.as_str(), *y))\n            .collect();\n\n        let n = valid.len();\n        if n == 0 {\n            return Ok(());\n        }\n\n        let area = coord.plot_area;\n        let fill = self.color.unwrap_or(Color::BLUE);\n        let width_fraction = self.width.unwrap_or(0.8);\n\n        match self.orientation {\n            Orientation::Vertical =\u003e {\n                let band_width = area.width() / n as f32;\n                let bar_width = band_width * width_fraction;\n\n                for (i, (_label, value)) in valid.iter().enumerate() {\n                    let x_center = area.left + (i as f32 + 0.5) * band_width;\n                    let x_left = x_center - bar_width / 2.0;\n                    let x_right = x_center + bar_width / 2.0;\n\n                    let y_top = area.bottom - coord.y_axis.scale.map(*value) as f32 * area.height();\n                    let y_bottom = area.bottom - coord.y_axis.scale.map(0.0) as f32 * area.height();\n\n                    let rect = Rect::new(x_left, y_top, x_right, y_bottom);\n                    backend.fill_rect(rect, fill)?;\n                }\n            }\n            Orientation::Horizontal =\u003e {\n                let band_height = area.height() / n as f32;\n                let bar_height = band_height * width_fraction;\n\n                for (i, (_label, value)) in valid.iter().enumerate() {\n                    let y_center = area.top + (i as f32 + 0.5) * band_height;\n                    let y_top = y_center - bar_height / 2.0;\n                    let y_bottom = y_center + bar_height / 2.0;\n\n                    let x_left = area.left + coord.x_axis.scale.map(0.0) as f32 * area.width();\n                    let x_right = area.left + coord.x_axis.scale.map(*value) as f32 * area.width();\n\n                    let rect = Rect::new(x_left, y_top, x_right, y_bottom);\n                    backend.fill_rect(rect, fill)?;\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    fn render_bar(\n        \u0026self,\n        coord: \u0026CartesianCoord,\n        backend: \u0026mut dyn DrawBackend,\n        context: \u0026BarRenderContext,\n    ) -\u003e Result\u003c()\u003e {\n        let valid: Vec\u003c(\u0026str, f64)\u003e = self\n            .x\n            .iter()\n            .zip(\u0026self.y)\n            .filter(|(x, y)| !x.is_empty() \u0026\u0026 !y.is_nan())\n            .map(|(x, y)| (x.as_str(), *y))\n            .collect();\n\n        let n = valid.len();\n        if n == 0 {\n            return Ok(());\n        }\n\n        let area = coord.plot_area;\n        let fill = self.color.unwrap_or(Color::BLUE);\n        let width_fraction = self.width.unwrap_or(0.8);\n\n        match self.orientation {\n            Orientation::Vertical =\u003e {\n                let band_width = area.width() / n as f32;\n                let total_groups = context\n                    .group_offsets\n                    .values()\n                    .map(|(_, t)| *t)\n                    .max()\n                    .unwrap_or(1);\n                let group_gap = 0.15;\n                let bar_width = if total_groups \u003e 1 {\n                    band_width * width_fraction * (1.0 - group_gap) / total_groups as f32\n                } else {\n                    band_width * width_fraction\n                };\n\n                for (i, (label, value)) in valid.iter().enumerate() {\n                    let base_x_center = area.left + (i as f32 + 0.5) * band_width;\n                    let x_offset = if let Some(group_name) = \u0026self.group {\n                        if let Some(\u0026(idx, total)) = context.group_offsets.get(group_name) {\n                            let sub_band = band_width * (1.0 - group_gap) / total as f32;\n                            (idx as f32 - (total - 1) as f32 / 2.0) * sub_band\n                        } else {\n                            0.0\n                        }\n                    } else {\n                        0.0\n                    };\n                    let x_center = base_x_center + x_offset;\n                    let x_left = x_center - bar_width / 2.0;\n                    let x_right = x_center + bar_width / 2.0;\n\n                    // For stacked or floating bars: y_bottom is baseline, y_top is baseline + value\n                    let (y_bottom_val, y_top_val) = if self.stack.is_some() {\n                        let baseline = *context.stacked_baselines.get(*label).unwrap_or(\u00260.0);\n                        (baseline, baseline + value)\n                    } else if let Some(base) = self.base {\n                        (base, base + value)\n                    } else {\n                        (0.0, *value)\n                    };\n\n                    let y_top =\n                        area.bottom - coord.y_axis.scale.map(y_top_val) as f32 * area.height();\n                    let y_bottom =\n                        area.bottom - coord.y_axis.scale.map(y_bottom_val) as f32 * area.height();\n\n                    // Ensure valid rect\n                    let rect_top = y_top.min(y_bottom);\n                    let rect_bottom = y_top.max(y_bottom);\n\n                    let rect = Rect::new(x_left, rect_top, x_right, rect_bottom);\n                    backend.fill_rect(rect, fill)?;\n                }\n            }\n            Orientation::Horizontal =\u003e {\n                let band_height = area.height() / n as f32;\n                let total_groups = context\n                    .group_offsets\n                    .values()\n                    .map(|(_, t)| *t)\n                    .max()\n                    .unwrap_or(1);\n                let group_gap = 0.15;\n                let bar_height = if total_groups \u003e 1 {\n                    band_height * width_fraction * (1.0 - group_gap) / total_groups as f32\n                } else {\n                    band_height * width_fraction\n                };\n\n                for (i, (label, value)) in valid.iter().enumerate() {\n                    let base_y_center = area.top + (i as f32 + 0.5) * band_height;\n                    let y_offset = if let Some(group_name) = \u0026self.group {\n                        if let Some(\u0026(idx, total)) = context.group_offsets.get(group_name) {\n                            let sub_band = band_height * (1.0 - group_gap) / total as f32;\n                            (idx as f32 - (total - 1) as f32 / 2.0) * sub_band\n                        } else {\n                            0.0\n                        }\n                    } else {\n                        0.0\n                    };\n                    let y_center = base_y_center + y_offset;\n                    let y_top = y_center - bar_height / 2.0;\n                    let y_bottom = y_center + bar_height / 2.0;\n\n                    // For stacked or floating horizontal bars: x_left is baseline, x_right is baseline + value\n                    let (x_left_val, x_right_val) = if self.stack.is_some() {\n                        let baseline = *context.stacked_baselines.get(*label).unwrap_or(\u00260.0);\n                        (baseline, baseline + value)\n                    } else if let Some(base) = self.base {\n                        (base, base + value)\n                    } else {\n                        (0.0, *value)\n                    };\n                    let x_left =\n                        area.left + coord.x_axis.scale.map(x_left_val) as f32 * area.width();\n                    let x_right =\n                        area.left + coord.x_axis.scale.map(x_right_val) as f32 * area.width();\n\n                    let rect = Rect::new(x_left, y_top, x_right, y_bottom);\n                    backend.fill_rect(rect, fill)?;\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    fn as_bar_info(\u0026self) -\u003e Option\u003c(Option\u003c\u0026str\u003e, Option\u003c\u0026str\u003e, Orientation)\u003e {\n        Some((\n            self.group.as_deref(),\n            self.stack.as_deref(),\n            self.orientation,\n        ))\n    }\n\n    fn as_bar_data(\u0026self) -\u003e Option\u003c(\u0026[String], \u0026[f64])\u003e {\n        Some((\u0026self.x, \u0026self.y))\n    }\n\n    // No clue if this works\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        let valid_y: Vec\u003cf64\u003e = self.y.iter().copied().filter(|v| !v.is_nan()).collect();\n        if valid_y.is_empty() {\n            return None;\n        }\n        let y_min = valid_y\n            .iter()\n            .copied()\n            .fold(f64::INFINITY, f64::min)\n            .min(0.0);\n        let y_max = valid_y\n            .iter()\n            .copied()\n            .fold(f64::NEG_INFINITY, f64::max)\n            .max(0.0);\n        Some(DataExtent {\n            x_min: 0.0,\n            x_max: self.x.len() as f64,\n            y_min,\n            y_max,\n        })\n    }\n}\n\n// ── AreaMark ─────────────────────────────────────────────────────────────────────────────────────\n/// Area chart for stacked values\n#[derive(Debug, Clone)]\n#[allow(dead_code)]\npub struct AreaMark {\n    /// X data values.\n    x: Vec\u003cf64\u003e,\n    /// Y data values (must be the same length as `x`)\n    y: Vec\u003cf64\u003e,\n    baseline: AreaBaseline,\n    /// Area fill color\n    fill: Color,\n    /// Area opacity, 1 to 0\n    opacity: f32,\n}\n#[derive(Debug, Clone, Copy, PartialEq, Default)]\n#[non_exhaustive]\npub enum AreaBaseline {\n    #[default]\n    Zero, // fill between y and y=0\n    Fixed(f64), // fill between y and a fixed value\n}\nimpl AreaMark {\n    /// New area chart from x and y data with default color and full opacity.\n    #[must_use]\n    pub fn new(x: Vec\u003cf64\u003e, y: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            x,\n            y,\n            baseline: AreaBaseline::Zero,\n            fill: Color::RED,\n            opacity: 1.,\n        }\n    }\n\n    /// Builder: set area color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.fill = c;\n        self\n    }\n\n    /// Builder: set area opacity 1 to 0.\n    #[must_use]\n    pub fn opacity(mut self, o: f32) -\u003e Self {\n        self.opacity = o;\n        self\n    }\n}\nimpl Mark for AreaMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let mut commands = Vec::new();\n        let mut need_move = true;\n\n        let baseline_y = match self.baseline {\n            AreaBaseline::Zero =\u003e 0.0,\n            AreaBaseline::Fixed(y) =\u003e y,\n        };\n        let _baseline = coord.data_to_pixel(0.0, baseline_y);\n\n        for (x, y) in self.x.iter().zip(\u0026self.y) {\n            if x.is_nan() || y.is_nan() {\n                need_move = true;\n                continue;\n            }\n            let p = coord.data_to_pixel(*x, *y);\n            if need_move {\n                commands.push(PathCommand::MoveTo(p));\n                need_move = false;\n            } else {\n                commands.push(PathCommand::LineTo(p));\n            }\n        }\n\n        if !commands.is_empty() \u0026\u0026 commands.len() \u003e 1 {\n            // Close path back to baseline\n            let first_x = self.x.first().map_or(0.0, |v| *v);\n            let last_x = self.x.last().map_or(0.0, |v| *v);\n            commands.push(PathCommand::LineTo(coord.data_to_pixel(last_x, baseline_y)));\n            commands.push(PathCommand::LineTo(\n                coord.data_to_pixel(first_x, baseline_y),\n            ));\n            commands.push(PathCommand::Close);\n        }\n\n        if commands.is_empty() {\n            return Ok(());\n        }\n\n        let path = Path { commands };\n        let style = PathStyle {\n            fill_color: Some(self.fill),\n            opacity: self.opacity,\n            ..PathStyle::default()\n        };\n        backend.draw_path(\u0026path, \u0026style)\n    }\n\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        let baseline_y = match self.baseline {\n            AreaBaseline::Zero =\u003e 0.0,\n            AreaBaseline::Fixed(y) =\u003e y,\n        };\n        let y_min = self\n            .y\n            .iter()\n            .copied()\n            .fold(f64::INFINITY, f64::min)\n            .min(baseline_y);\n        let y_max = self\n            .y\n            .iter()\n            .copied()\n            .fold(f64::NEG_INFINITY, f64::max)\n            .max(baseline_y);\n        Some(DataExtent {\n            x_min: self.x.iter().copied().fold(f64::INFINITY, f64::min),\n            x_max: self.x.iter().copied().fold(f64::NEG_INFINITY, f64::max),\n            y_min,\n            y_max,\n        })\n    }\n}\n// ── HeatmapMark ──────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct HeatmapMark { data: Vec\u003cVec\u003cf64\u003e\u003e, colormap: Colormap, ... }\n\n// ── BoxMark ──────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct BoxMark { groups: Vec\u003cVec\u003cf64\u003e\u003e, color: Color, ... }\n\n// ── ViolinMark ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct ViolinMark { groups: Vec\u003cVec\u003cf64\u003e\u003e, ... }\n\n// ── PieMark ──────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct PieMark { values: Vec\u003cf64\u003e, labels: Vec\u003cString\u003e, ... }\n\n// ── ContourMark ──────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct ContourMark { z: Vec\u003cVec\u003cf64\u003e\u003e, levels: Vec\u003cf64\u003e, ... }\n\n// ── RidgeMark ────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.5.0): pub struct RidgeMark { densities: Vec\u003cVec\u003cf64\u003e\u003e, offset: f64 }\n\n// ── StepMark ─────────────────────────────────────────────────────────────────────────────────────\n/// Step chart: constant between points with vertical/horizontal transitions.\n#[derive(Debug, Clone)]\npub struct StepMark {\n    /// X data values.\n    pub x: Vec\u003cf64\u003e,\n    /// Y data values.\n    pub y: Vec\u003cf64\u003e,\n    /// Step position: when the vertical transition happens.\n    pub where_: StepPosition,\n    /// Line color.\n    pub color: Color,\n    /// Stroke width in pixels.\n    pub width: f32,\n}\n\n/// Where the vertical step transition happens relative to data points.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]\n#[non_exhaustive]\npub enum StepPosition {\n    #[default]\n    /// Vertical transition happens *before* the data point (`curveStepBefore`).\n    Pre,\n    /// Vertical transition at midpoint between points (`curveStep`).\n    Mid,\n    /// Vertical transition happens *after* the data point (`curveStepAfter`).\n    Post,\n}\n\nimpl StepMark {\n    /// New step chart from x and y data with default color.\n    #[must_use]\n    pub fn new(x: Vec\u003cf64\u003e, y: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            x,\n            y,\n            where_: StepPosition::default(),\n            color: Color::BLUE,\n            width: 2.0,\n        }\n    }\n\n    /// Builder: set step position.\n    #[must_use]\n    pub fn position(mut self, p: StepPosition) -\u003e Self {\n        self.where_ = p;\n        self\n    }\n\n    /// Builder: set line color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.color = c;\n        self\n    }\n\n    /// Builder: set stroke width in pixels.\n    #[must_use]\n    pub fn width(mut self, w: f32) -\u003e Self {\n        self.width = w;\n        self\n    }\n}\n\nimpl Mark for StepMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let mut commands = Vec::new();\n        let mut need_move = true;\n\n        let n = self.x.len().min(self.y.len());\n        if n \u003c 2 {\n            return Ok(());\n        }\n\n        // Collect valid points (skip NaN)\n        let valid: Vec\u003c(f64, f64)\u003e = (0..n)\n            .filter_map(|i| {\n                let x = self.x[i];\n                let y = self.y[i];\n                if x.is_nan() || y.is_nan() {\n                    None\n                } else {\n                    Some((x, y))\n                }\n            })\n            .collect();\n\n        if valid.len() \u003c 2 {\n            return Ok(());\n        }\n\n        for i in 0..valid.len() {\n            let (x, y) = valid[i];\n            let curr = coord.data_to_pixel(x, y);\n\n            if need_move {\n                commands.push(PathCommand::MoveTo(curr));\n                need_move = false;\n                continue;\n            }\n\n            let (prev_x, prev_y) = valid[i - 1];\n            let prev = coord.data_to_pixel(prev_x, prev_y);\n\n            match self.where_ {\n                StepPosition::Pre =\u003e {\n                    commands.push(PathCommand::LineTo(Point::new(curr.x, prev.y)));\n                    commands.push(PathCommand::LineTo(curr));\n                }\n                StepPosition::Post =\u003e {\n                    commands.push(PathCommand::LineTo(Point::new(prev.x, curr.y)));\n                    commands.push(PathCommand::LineTo(curr));\n                }\n                StepPosition::Mid =\u003e {\n                    let mid_x = (prev.x + curr.x) / 2.0;\n                    commands.push(PathCommand::LineTo(Point::new(mid_x, prev.y)));\n                    commands.push(PathCommand::LineTo(Point::new(mid_x, curr.y)));\n                    commands.push(PathCommand::LineTo(curr));\n                }\n            }\n        }\n\n        if commands.is_empty() {\n            return Ok(());\n        }\n\n        let path = Path { commands };\n        let style = PathStyle {\n            stroke_color: self.color,\n            stroke_width: self.width,\n            fill_color: None,\n            line_cap: LineCap::Round,\n            line_join: LineJoin::Round,\n            ..PathStyle::default()\n        };\n        backend.draw_path(\u0026path, \u0026style)\n    }\n\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        extent_from_xy(\u0026self.x, \u0026self.y)\n    }\n}\n\n// ── HistogramMark ───────────────────────────────────────────────────────────────────────\n\n/// Histogram: bar chart with bins computed from data.\n#[derive(Debug, Clone)]\npub struct HistogramMark {\n    /// Raw data values.\n    pub data: Vec\u003cf64\u003e,\n    /// Binning method.\n    pub method: BinMethod,\n    /// Bar color.\n    pub color: Color,\n}\n\nimpl HistogramMark {\n    /// New histogram from raw data.\n    #[must_use]\n    pub fn new(data: Vec\u003cf64\u003e) -\u003e Self {\n        Self {\n            data,\n            method: BinMethod::default(),\n            color: Color::from_hex(0x00_4C_72B0),\n        }\n    }\n\n    /// Builder: set binning method.\n    #[must_use]\n    pub fn method(mut self, m: BinMethod) -\u003e Self {\n        self.method = m;\n        self\n    }\n\n    /// Builder: set bar color.\n    #[must_use]\n    pub fn color(mut self, c: Color) -\u003e Self {\n        self.color = c;\n        self\n    }\n}\n\nimpl Mark for HistogramMark {\n    fn render(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let transform = BinTransform::new(self.method);\n        let bins: Vec\u003cBin\u003e = transform.compute(\u0026self.data);\n\n        if bins.is_empty() {\n            return Ok(());\n        }\n\n        let area = coord.plot_area;\n        let n = bins.len();\n        let band_width = area.width() / n as f32;\n        let bar_width = band_width * 0.8;\n\n        let y_max = bins.iter().map(|b| b.count as f64).fold(0.0f64, f64::max);\n\n        for (i, bin) in bins.iter().enumerate() {\n            let x_center = area.left + (i as f32 + 0.5) * band_width;\n            let x_left = x_center - bar_width / 2.0;\n            let x_right = x_center + bar_width / 2.0;\n\n            let height_ratio = if y_max \u003e 0.0 {\n                (bin.count as f64 / y_max) as f32\n            } else {\n                0.0\n            };\n            let bar_height = height_ratio * area.height();\n\n            let y_top = area.bottom - bar_height;\n            let y_bottom = area.bottom;\n\n            let rect = Rect::new(x_left, y_top, x_right, y_bottom);\n            backend.fill_rect(rect, self.color)?;\n        }\n\n        Ok(())\n    }\n\n    fn data_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        let data: Vec\u003cf64\u003e = self.data.iter().copied().filter(|v| !v.is_nan()).collect();\n        if data.is_empty() {\n            return None;\n        }\n        let transform = BinTransform::new(self.method);\n        let bins = transform.compute(\u0026data);\n        let count_max = bins.iter().map(|b| b.count).max().unwrap_or(0) as f64;\n        Some(DataExtent {\n            x_min: bins.first().map_or(0.0, |b| b.left),\n            x_max: bins.last().map_or(1.0, |b| b.right),\n            y_min: 0.0,\n            y_max: count_max,\n        })\n    }\n}\n\n// ── ErrorBarMark ─────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct ErrorBarMark { x: Vec\u003cf64\u003e, y: Vec\u003cf64\u003e, err: Vec\u003cf64\u003e, color: Color }\n\n// ── RugMark ──────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct RugMark { values: Vec\u003cf64\u003e, side: Side, color: Color }\n\n// ── helpers ──────────────────────────────────────────────────────────────────────────────────────\n\n/// Approximate a circle with four cubic Bézier arcs (magic constant `4/3 * (√2 - 1)`).\nfn push_circle(cmds: \u0026mut Vec\u003cPathCommand\u003e, c: Point, r: f32) {\n    const K: f32 = 0.552_284_8;\n    let kr = K * r;\n\n    cmds.push(PathCommand::MoveTo(Point::new(c.x + r, c.y)));\n    cmds.push(PathCommand::CubicTo(\n        Point::new(c.x + r, c.y + kr),\n        Point::new(c.x + kr, c.y + r),\n        Point::new(c.x, c.y + r),\n    ));\n    cmds.push(PathCommand::CubicTo(\n        Point::new(c.x - kr, c.y + r),\n        Point::new(c.x - r, c.y + kr),\n        Point::new(c.x - r, c.y),\n    ));\n    cmds.push(PathCommand::CubicTo(\n        Point::new(c.x - r, c.y - kr),\n        Point::new(c.x - kr, c.y - r),\n        Point::new(c.x, c.y - r),\n    ));\n    cmds.push(PathCommand::CubicTo(\n        Point::new(c.x + kr, c.y - r),\n        Point::new(c.x + r, c.y - kr),\n        Point::new(c.x + r, c.y),\n    ));\n    cmds.push(PathCommand::Close);\n}\n\n/// Compute the axis-aligned bounding box of paired x/y data, skipping NaN entries.\nfn extent_from_xy(x: \u0026[f64], y: \u0026[f64]) -\u003e Option\u003cDataExtent\u003e {\n    let mut x_min = f64::INFINITY;\n    let mut x_max = f64::NEG_INFINITY;\n    let mut y_min = f64::INFINITY;\n    let mut y_max = f64::NEG_INFINITY;\n    let mut any = false;\n\n    for (\u0026xv, \u0026yv) in x.iter().zip(y) {\n        if xv.is_nan() || yv.is_nan() {\n            continue;\n        }\n        x_min = x_min.min(xv);\n        x_max = x_max.max(xv);\n        y_min = y_min.min(yv);\n        y_max = y_max.max(yv);\n        any = true;\n    }\n\n    if any {\n        Some(DataExtent {\n            x_min,\n            x_max,\n            y_min,\n (0.3.0): pub struct Identity;\n//              -- no adjustment (default)\n\n// ── Fill ─────────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct Fill;\n//              -- normalize stack to 100%\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-3","src","statistics.rs"],"content":"//! Statistical transforms: binning, density estimation, regression, aggregation.\n//!\n//! Each transform takes raw data and produces output data ready for a mark.\n//! Status: stub. Implementations land in 0.2.0–0.5.0 behind the `stats` feature.\n\n// ── BinMethod ─────────────────────────────────────────────────────────────────────────────────────\n\n/// Method for automatic bin count selection.\n#[derive(Debug, Clone, Copy, PartialEq, Default)]\npub enum BinMethod {\n    #[default]\n    /// Sturges' rule: `ceil(1 + log2(n))` bins.\n    Sturges,\n    /// Freedman-Diaconis: `2 * IQR * n^(-1/3)` bin width.\n    FreedmanDiaconis,\n    /// Scott's rule: `3.5 * std * n^(-1/3)` bin width.\n    Scott,\n    /// Exact number of bins.\n    Count(usize),\n    /// Exact bin width.\n    Width(f64),\n}\n\nimpl BinMethod {\n    /// Compute the number of bins for the given data.\n    pub fn bin_count(\u0026self, data: \u0026[f64]) -\u003e usize {\n        let n = data.len();\n        if n == 0 {\n            return 1;\n        }\n        match self {\n            Self::Count(k) =\u003e *k,\n            Self::Sturges =\u003e (1.0 + (n as f64).log2()).ceil() as usize,\n            Self::FreedmanDiaconis =\u003e {\n                let q1 = percentile(data, 0.25);\n                let q3 = percentile(data, 0.75);\n                let iqr = q3 - q1;\n                if iqr \u003c= 0.0 {\n                    return Self::Sturges.bin_count(data);\n                }\n                let h = 2.0 * iqr * (n as f64).powf(-1.0 / 3.0);\n                let range = data.iter().copied().fold(f64::NEG_INFINITY, f64::max)\n                    - data.iter().copied().fold(f64::INFINITY, f64::min);\n                if h \u003e 0.0 {\n                    (range / h).ceil() as usize\n                } else {\n                    Self::Sturges.bin_count(data)\n                }\n            }\n            Self::Scott =\u003e {\n                let mean = data.iter().sum::\u003cf64\u003e() / n as f64;\n                let var = data.iter().map(|\u0026x| (x - mean).powi(2)).sum::\u003cf64\u003e() / n as f64;\n                let std = var.sqrt();\n                if std \u003c= 0.0 {\n                    return Self::Sturges.bin_count(data);\n                }\n                let h = 3.5 * std * (n as f64).powf(-1.0 / 3.0);\n                let range = data.iter().copied().fold(f64::NEG_INFINITY, f64::max)\n                    - data.iter().copied().fold(f64::INFINITY, f64::min);\n                if h \u003e 0.0 {\n                    (range / h).ceil() as usize\n                } else {\n                    Self::Sturges.bin_count(data)\n                }\n            }\n            Self::Width(w) =\u003e {\n                let range = data.iter().copied().fold(f64::NEG_INFINITY, f64::max)\n                    - data.iter().copied().fold(f64::INFINITY, f64::min);\n                if *w \u003e 0.0 {\n                    (range / w).ceil() as usize\n                } else {\n                    Self::Sturges.bin_count(data)\n                }\n            }\n        }\n    }\n}\n\n/// A single histogram bin.\n#[derive(Debug, Clone, Copy, PartialEq)]\npub struct Bin {\n    /// Left edge of the bin.\n    pub left: f64,\n    /// Right edge of the bin.\n    pub right: f64,\n    /// Count of values in this bin.\n    pub count: usize,\n}\n\n// ── Bin transform ─────────────────────────────────────────────────────────────────────────────\n\n/// Compute histogram bins from data.\n#[derive(Debug, Clone, Default)]\npub struct BinTransform {\n    /// Binning method.\n    pub method: BinMethod,\n    /// Optional explicit min/max range.\n    pub range: Option\u003c(f64, f64)\u003e,\n}\n\nimpl BinTransform {\n    /// Create a new bin transform with the given method.\n    #[must_use]\n    pub fn new(method: BinMethod) -\u003e Self {\n        Self {\n            method,\n            range: None,\n        }\n    }\n\n    /// Set the explicit range.\n    #[must_use]\n    pub fn range(mut self, min: f64, max: f64) -\u003e Self {\n        self.range = Some((min, max));\n        self\n    }\n\n    /// Compute bins from the data.\n    #[must_use]\n    pub fn compute(\u0026self, data: \u0026[f64]) -\u003e Vec\u003cBin\u003e {\n        let data: Vec\u003cf64\u003e = data.iter().copied().filter(|v| !v.is_nan()).collect();\n        if data.is_empty() {\n            return vec![];\n        }\n\n        let (dmin, dmax) = self.range.unwrap_or((\n            data.iter().copied().fold(f64::INFINITY, f64::min),\n            data.iter().copied().fold(f64::NEG_INFINITY, f64::max),\n        ));\n\n        if dmax \u003c= dmin {\n            return vec![Bin {\n                left: dmin,\n                right: dmax,\n                count: data.len(),\n            }];\n        }\n\n        let k = self.method.bin_count(\u0026data).max(1);\n        let width = (dmax - dmin) / k as f64;\n\n        let mut bins = Vec::with_capacity(k);\n        for i in 0..k {\n            bins.push(Bin {\n                left: dmin + i as f64 * width,\n                right: dmin + (i + 1) as f64 * width,\n                count: 0,\n            });\n        }\n\n        for \u0026v in \u0026data {\n            let idx = ((v - dmin) / width).floor() as usize;\n            let idx = idx.min(k - 1);\n            bins[idx].count += 1;\n        }\n\n        bins\n    }\n}\n\n// ── helpers ──────────────────────────────────────────────────────────────────────────────────────\n\nfn percentile(data: \u0026[f64], p: f64) -\u003e f64 {\n    if data.is_empty() {\n        return f64::NAN;\n    }\n    let mut sorted: Vec\u003cf64\u003e = data.to_vec();\n    sorted.sort_by(|a, b| a.partial_cmp(b).unwrap_or(std::cmp::Ordering::Equal));\n    let idx = (p * (sorted.len() - 1) as f64).floor() as usize;\n    let frac = p * (sorted.len() - 1) as f64 - idx as f64;\n    if idx + 1 \u003e= sorted.len() {\n        return sorted[idx];\n    }\n    sorted[idx] * (1.0 - frac) + sorted[idx + 1] * frac\n}\n\n// ── KDE ──────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct KDE { bandwidth: f64, kernel: Kernel }\n//              -- kernel density estimation\n\n// ── Boxplot ──────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct Boxplot { whisker_method: Whisker }\n//              -- five-number summary\n\n// ── Regression ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct Regression { kind: RegressionKind, ci: Option\u003cf64\u003e }\n//              -- linear, polynomial, loess fits\n\n// ── Aggregate ────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.3.0): pub struct Aggregate { group_by: String, agg: Aggregation }\n//              -- group-and-summarize\n\n// ── Density ──────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct Density { bandwidth: f64 }\n\n// ── Smooth ───────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.5.0): pub struct Smooth { window: usize, method: Smoother }\n","traces":[{"line":26,"address":[8336752,8336775],"length":1,"stats":{"Line":2}},{"line":28,"address":[6963978],"length":1,"stats":{"Line":1}},{"line":31,"address":[6963987],"length":1,"stats":{"Line":1}},{"line":32,"address":[6964609],"length":1,"stats":{"Line":0}},{"line":33,"address":[6964599],"length":1,"stats":{"Line":1}},{"line":35,"address":[6963999],"length":1,"stats":{"Lin {"Line":1}},{"line":163,"address":[6966016,6966747],"length":1,"stats":{"Line":0}},{"line":164,"address":[8338976,8339440],"length":1,"stats":{"Line":0}},{"line":168,"address":[8348848,8348563,8348909,8348508,8348620,8348783],"length":1,"stats":{"Line":0}},{"line":169,"address":[6966270,6966230,6966665],"length":1,"stats":{"Line":0}},{"line":171,"address":[6966680,6966338],"length":1,"stats":{"Line":0}},{"line":172,"address":[6966498],"length":1,"stats":{"Line":0}},{"line":174,"address":[6966359],"length":1,"stats":{"Line":0}}],"covered":18,"coverable":44},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","src","colorbars.rs"],"content":"//! Colorbars: continuous color scales drawn alongside heatmaps and contour plots.\n//!\n//! Status: stub. Implementation lands in 0.4.0.\n\n// ── Colorbar ─────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct Colorbar { colormap: Colormap, range: (f64, f64),\n//                  orientation: ColorbarOrientation, ticks: Option\u003cVec\u003cf64\u003e\u003e, label: Option\u003cString\u003e }\n\n// ── ColorbarOrientation ──────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub enum ColorbarOrientation { Vertical, Horizontal }\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","src","facets.rs"],"content":"//! Faceting: split data by a grouping variable and draw one panel per group.\n//!\n//! `FacetWrap` lays panels out in a grid that wraps. `FacetGrid` puts one\n//! variable on rows and another on columns. `FacetMatrix` is a full pairwise\n//! matrix (one panel per combination).\n//!\n//! Status: stub. Implementation lands in 0.4.0.\n\n// ── FacetWrap ────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct FacetWrap { variable: String, ncol: Option\u003cusize\u003e, nrow: Option\u003cusize\u003e }\n\n// ── FacetGrid ────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct FacetGrid { rows: String, cols: String }\n\n// ── FacetMatrix ──────────────────────────────────────────────────────────────────────────────────\n// TODO(0.5.0): pub struct FacetMatrix { variables: Vec\u003cString\u003e, diag: DiagonalMark }\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","src","layouts.rs"],"content":"//! Layout: arrange multiple charts on a single figure.\n//!\n//! Layout types control how panels are sized and positioned. `GridLayout` is\n//! the workhorse: a fixed grid of rows and columns with optional gaps and\n//! padding. `FreeLayout` allows arbitrary positioning. `FlowLayout` packs\n//! variable-size panels left-to-right with wrapping.\n//!\n//! Status: stub. Implementation lands in 0.4.0.\n\n// ── Layout ───────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub trait Layout { fn allocate(\u0026self, viewport: Rect) -\u003e Vec\u003cRect\u003e; }\n\n// ── GridLayout ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct GridLayout { rows: usize, cols: usize, gap: f32, padding: f32 }\n\n// ── FreeLayout ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.5.0): pub struct FreeLayout { panels: Vec\u003c(Rect, PanelId)\u003e }\n\n// ── FlowLayout ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.5.0): pub struct FlowLayout { row_height: f32, horizontal_gap: f32, vertical_gap: f32 }\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","src","legends.rs"],"content":"//! Legends: explain mark color/shape/size mappings.\n//!\n//! Status: stub. Implementation lands in 0.4.0.\n\n// ── Legend ───────────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct Legend { items: Vec\u003cLegendItem\u003e, position: LegendPosition, title: Option\u003cString\u003e }\n\n// ── LegendItem ───────────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub struct LegendItem { label: String, glyph: LegendGlyph, color: Color }\n\n// ── LegendPosition ───────────────────────────────────────────────────────────────────────────────\n// TODO(0.4.0): pub enum LegendPosition { TopLeft, TopRight, BottomLeft, BottomRight, Outside }\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","src","lib.rs"],"content":"//! Layer 4 — layout, faceting, legends, colorbars.\n//!\n//! Layer 4 arranges multiple charts on a single figure. None of these types\n//! render anything themselves: they compute panel positions and delegate to\n//! the marks and backends in lower layers.\n//!\n//! Modules:\n//! - [`layouts`]: grid and free panel layouts (stub).\n//! - [`facets`]: split data by a variable, one panel per group (stub).\n//! - [`legends`]: legend types (stub).\n//! - [`colorbars`]: continuous color scales for heatmaps (stub).\n\npub mod colorbars;\npub mod facets;\npub mod layouts;\npub mod legends;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","albin","Documents","starsight","starsight-layer-4","tests","snapshot.rs"],"content":"\n","traces":[{"line":1,"address":[390663,390656],"length":1,"stats":{"Line":2}}],"covered":1,"coverable":1},{"path":["/","home","albin","Documents","starsight","starsight-layer-5","src","figures.rs"],"content":"//! Figure: the top-level builder users assemble marks into.\n//!\n//! `Figure` owns the marks (`Vec\u003cBox\u003cdyn Mark\u003e\u003e`) and rendering parameters\n//! (size, title, axis labels). It exposes a chainable builder API and a\n//! `save` method that dispatches to the appropriate backend by file extension.\n\n#![allow(\n    clippy::cast_precision_loss,\n    clippy::cast_possible_truncation,\n    clippy::should_implement_trait\n)]\n\nuse starsight_layer_1::backends::DrawBackend;\nuse starsight_layer_1::backends::rasters::SkiaBackend;\nuse starsight_layer_1::backends::vectors::SvgBackend;\nuse starsight_layer_1::errors::{Result, StarsightError};\nuse starsight_layer_1::primitives::{Color, Rect};\nuse starsight_layer_2::axes::Axis;\nuse starsight_layer_2::coords::CartesianCoord;\nuse starsight_layer_3::marks::{BarRenderContext, DataExtent, Mark, Orientation};\n\n// ── Figure ───────────────────────────────────────────────────────────────────────────────────────\n\n/// Top-level chart builder.\npub struct Figure {\n    marks: Vec\u003cBox\u003cdyn Mark\u003e\u003e,\n    /// Optional chart title rendered above the plot area.\n    pub title: Option\u003cString\u003e,\n    /// Optional x-axis label.\n    pub x_label: Option\u003cString\u003e,\n    /// Optional y-axis label.\n    pub y_label: Option\u003cString\u003e,\n    /// Output width in pixels.\n    pub width: u32,\n    /// Output height in pixels.\n    pub height: u32,\n}\n\nimpl Figure {\n    /// Empty figure of `width × height` pixels.\n    #[must_use]\n    pub fn new(width: u32, height: u32) -\u003e Self {\n        Self {\n            marks: Vec::new(),\n            title: None,\n            x_label: None,\n            y_label: None,\n            width,\n            height,\n        }\n    }\n\n    /// Builder: set chart title.\n    #[must_use]\n    pub fn title(mut self, s: impl Into\u003cString\u003e) -\u003e Self {\n        self.title = Some(s.into());\n        self\n    }\n\n    /// Builder: set the x-axis label.\n    #[must_use]\n    pub fn x_label(mut self, s: impl Into\u003cString\u003e) -\u003e Self {\n        self.x_label = Some(s.into());\n        self\n    }\n\n    /// Builder: set the y-axis label.\n    #[must_use]\n    pub fn y_label(mut self, s: impl Into\u003cString\u003e) -\u003e Self {\n        self.y_label = Some(s.into());\n        self\n    }\n\n    /// Append a mark.\n    #[must_use]\n    pub fn add(mut self, mark: impl Mark + 'static) -\u003e Self {\n        self.marks.push(Box::new(mark));\n        self\n    }\n\n    /// Convenience constructor used by the `starsight::plot!` macro.\n    pub fn from_arrays(x: impl IntoIterator\u003cItem = f64\u003e, y: impl IntoIterator\u003cItem = f64\u003e) -\u003e Self {\n        let line = starsight_layer_3::marks::LineMark::new(\n            x.into_iter().collect(),\n            y.into_iter().collect(),\n        );\n        Self::new(800, 600).add(line)\n    }\n\n    /// Compute the merged data extent across all marks.\n    fn merged_extent(\u0026self) -\u003e Option\u003cDataExtent\u003e {\n        let mut merged: Option\u003cDataExtent\u003e = None;\n        for mark in \u0026self.marks {\n            if let Some(ext) = mark.data_extent() {\n                merged = Some(match merged {\n                    None =\u003e ext,\n                    Some(m) =\u003e DataExtent {\n                        x_min: m.x_min.min(ext.x_min),\n                        x_max: m.x_max.max(ext.x_max),\n                        y_min: m.y_min.min(ext.y_min),\n                        y_max: m.y_max.max(ext.y_max),\n                    },\n                });\n            }\n        }\n        merged\n    }\n\n    /// Check if any marks need bar context (have group, stack, or base set).\n    fn has_bar_marks(\u0026self) -\u003e bool {\n        self.marks.iter().any(|m| m.as_bar_info().is_some())\n    }\n    fn compute_bar_context(\u0026self) -\u003e BarRenderContext {\n        let mut ctx = BarRenderContext::default();\n\n        // First: check if ANY marks have group or stack (need special rendering)\n        let has_any_grouped = self.marks.iter().any(|m| {\n            m.as_bar_info()\n                .map(|(group, _, _)| group.is_some())\n                .unwrap_or(false)\n        });\n        let has_any_stacked = self.marks.iter().any(|m| {\n            m.as_bar_info()\n                .map(|(_, stack, _)| stack.is_some())\n                .unwrap_or(false)\n        });\n\n        if has_any_grouped {\n            // For grouped bars: collect all unique groups and calculate total\n            let mut groups: Vec\u003cString\u003e = Vec::new();\n            for mark in \u0026self.marks {\n                if let Some((group, _, _)) = mark.as_bar_info() {\n                    if let Some(g) = group {\n                        if !groups.contains(\u0026g.to_string()) {\n                            groups.push(g.to_string());\n                        }\n                    }\n                }\n            }\n\n            // Total groups = count of ALL marks that have group set, not per-group count\n            let total_groups = self\n                .marks\n                .iter()\n                .filter(|m| {\n                    m.as_bar_info()\n                        .map(|(g, _, _)| g.is_some())\n                        .unwrap_or(false)\n                })\n                .count() as i32;\n\n            // Assign index to each group\n            for (idx, g) in groups.iter().enumerate() {\n                ctx.group_offsets\n                    .insert(g.clone(), (idx as i32, total_groups));\n            }\n        }\n\n        if has_any_stacked {\n            // For stacked bars: compute cumulative baselines per category\n            // We need to iterate in order (first mark adds to baseline 0, second adds to that, etc.)\n            // The issue is we can't access BarMark fields from dyn Mark\n\n            // For now: use simple approach - same width as non-stacked, will fix stacking in render_bar\n            // ctx.first_pass = false\n        }\n\n        ctx\n    }\n\n    /// Render marks, passing bar context for grouped/stacked bar rendering.\n    fn render_marks(\u0026self, coord: \u0026CartesianCoord, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let has_any_stacked = self.marks.iter().any(|m| {\n            m.as_bar_info()\n                .map(|(_, stack, _)| stack.is_some())\n                .unwrap_or(false)\n        });\n\n        if has_any_stacked {\n            // First pass: compute stacked baselines\n            let mut ctx = BarRenderContext::default();\n            ctx.first_pass = true;\n            for mark in \u0026self.marks {\n                mark.render_bar(coord, backend, \u0026ctx)?;\n            }\n\n            // Second pass: render with accumulated baselines\n            let mut ctx = BarRenderContext::default();\n            ctx.first_pass = false;\n            ctx.stacked_baselines = self.compute_stacked_baselines();\n            for mark in \u0026self.marks {\n                mark.render_bar(coord, backend, \u0026ctx)?;\n            }\n        } else if self.has_bar_marks() {\n            let bar_ctx = self.compute_bar_context();\n            for mark in \u0026self.marks {\n                mark.render_bar(coord, backend, \u0026bar_ctx)?;\n            }\n        } else {\n            for mark in \u0026self.marks {\n                mark.render(coord, backend)?;\n            }\n        }\n        Ok(())\n    }\n\n    /// Compute stacked baselines - returns map of label -\u003e cumulative END position after EACH bar.\n    /// This is used by render_bar to know where each bar should start.\n    fn compute_stacked_baselines(\u0026self) -\u003e std::collections::HashMap\u003cString, f64\u003e {\n        let mut baselines = std::collections::HashMap::new();\n\n        // Iterate marks in order - each stacked bar adds to the baseline\n        for mark in \u0026self.marks {\n            if let Some((_, stack, _)) = mark.as_bar_info() {\n                if stack.is_some() {\n                    if let Some((labels, values)) = mark.as_bar_data() {\n                        for (label, value) in labels.iter().zip(values.iter()) {\n                            if !label.is_empty() \u0026\u0026 !value.is_nan() {\n                                // Get current baseline (where previous stack ended)\n                                let current_baseline = *baselines.get(label).unwrap_or(\u00260.0);\n                                // Store the END position (baseline + this bar's value)\n                                // This becomes the baseline for the NEXT stacked bar\n                                baselines.insert(label.clone(), current_baseline + value);\n                            }\n                        }\n                    }\n                }\n            }\n        }\n\n        baselines\n    }\n\n    /// Get category labels from bar marks (for category axis labels).\n    fn category_labels(\u0026self) -\u003e Vec\u003cString\u003e {\n        for mark in \u0026self.marks {\n            if let Some((labels, _)) = mark.as_bar_data() {\n                if !labels.is_empty() {\n                    return labels.to_vec();\n                }\n            }\n        }\n        vec![]\n    }\n\n    /// Check if we have horizontal bar marks (labels go on Y-axis).\n    fn has_horizontal_bars(\u0026self) -\u003e bool {\n        for mark in \u0026self.marks {\n            if let Some((_, _, o)) = mark.as_bar_info() {\n                if matches!(o, Orientation::Horizontal) {\n                    return true;\n                }\n            }\n        }\n        false\n    }\n\n    /// Borrow the underlying mark list.\n    #[must_use]\n    pub fn marks(\u0026self) -\u003e \u0026[Box\u003cdyn Mark\u003e] {\n        \u0026self.marks\n    }\n\n    /// Shared render path used by both [`render_png`](Self::render_png) and\n    /// [`render_svg`](Self::render_svg). Computes the data extent, builds the\n    /// axes and coordinate system, then dispatches drawing to the supplied\n    /// backend trait object.\n    fn render_to(\u0026self, backend: \u0026mut dyn DrawBackend) -\u003e Result\u003c()\u003e {\n        let extent = self\n            .merged_extent
