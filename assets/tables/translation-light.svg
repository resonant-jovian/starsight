<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 476" width="100%" height="auto" role="img" aria-label="starsight syntax reference for matplotlib, seaborn, ggplot2, plotly users" preserveAspectRatio="xMidYMid meet">
  <title>starsight syntax reference for matplotlib, seaborn, ggplot2, plotly users</title>
  <rect x="0.5" y="0.5" width="919" height="475" rx="12" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <rect x="24" y="24" width="872" height="36" fill="#ffffff"/>
  <text x="32" y="46" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="12.5" fill="#1a1a1a" text-anchor="start">you wrote</text>
  <text x="292" y="46" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="12.5" fill="#1a1a1a" text-anchor="start">in starsight</text>
  <text x="724" y="46" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="12.5" fill="#1a1a1a" text-anchor="start">note</text>
  <line x1="24" y1="60" x2="896" y2="60" stroke="#cccccc" stroke-width="1"/>
  <text x="32" y="78.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.plot(x, y)  (matplotlib)</text>
  <text x="292" y="78.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">Figure::new(800, 600).add(LineMark::new(x, y))</text>
  <text x="724" y="78.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">no global state</text>
  <rect x="24" y="88.5" width="872" height="28.5" fill="#ffffff"/>
  <text x="32" y="107.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.scatter(x, y, c=c)</text>
  <text x="292" y="107.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">PointMark::new(x, y).color_by(&amp;groups)</text>
  <text x="724" y="107.0" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">builder pattern</text>
  <text x="32" y="135.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.bar(labels, vals)</text>
  <text x="292" y="135.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">BarMark::new(categories, values)</text>
  <text x="724" y="135.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">grammar of graphics</text>
  <rect x="24" y="145.5" width="872" height="28.5" fill="#ffffff"/>
  <text x="32" y="164.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.boxplot([a, b])</text>
  <text x="292" y="164.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">BoxPlotMark::new(vec![BoxPlotGroup::new("a", a), …])</text>
  <text x="724" y="164.0" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">label travels with data</text>
  <text x="32" y="192.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">sns.violinplot(data=df, x=…,<tspan x="32" dy="16.5">y=…)</tspan></text>
  <text x="292" y="192.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">ViolinMark::new(groups).bandwidth(Bandwidth::Silverman)</text>
  <text x="724" y="192.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">bandwidth is a builder</text>
  <rect x="24" y="219.0" width="872" height="45.0" fill="#ffffff"/>
  <text x="32" y="237.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.pie(values, labels=…)</text>
  <text x="292" y="237.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">PieMark::new(values, labels).show_percent()</text>
  <text x="724" y="237.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">.inner_radius(0.5) →<tspan x="724" dy="16.5">donut</tspan></text>
  <text x="32" y="282.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">mpl_finance.candlestick_ohlc</text>
  <text x="292" y="282.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">CandlestickMark::new(vec![Ohlc { … }, …])</text>
  <text x="724" y="282.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">inline rows; no helper<tspan x="724" dy="16.5">crate</tspan></text>
  <rect x="24" y="309.0" width="872" height="28.5" fill="#ffffff"/>
  <text x="32" y="327.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.savefig("out.png")</text>
  <text x="292" y="327.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">.save("out.png")?</text>
  <text x="724" y="327.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">returns Result</text>
  <text x="32" y="356.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plt.show()</text>
  <text x="292" y="356.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">.show()?</text>
  <text x="724" y="356.0" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">feature: interactive</text>
  <rect x="24" y="366.0" width="872" height="28.5" fill="#ffffff"/>
  <text x="32" y="384.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">sns.heatmap(data)</text>
  <text x="292" y="384.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">HeatmapMark::new(data)</text>
  <text x="724" y="384.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">prismatica colormaps</text>
  <text x="32" y="413.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">ggplot + geom_point()</text>
  <text x="292" y="413.0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">Figure::new(W, H).add(PointMark::new(x, y))</text>
  <text x="724" y="413.0" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">builder, not +</text>
  <rect x="24" y="423.0" width="872" height="28.5" fill="#ffffff"/>
  <text x="32" y="441.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">px.scatter(df, x="a")  (plotly)</text>
  <text x="292" y="441.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#1a1a1a" text-anchor="start">plot!(df, x="a", y="b")</text>
  <text x="724" y="441.5" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a1a1a" text-anchor="start">feature: polars</text>
