<svg xmlns="http://www.w3.org/2000/svg" height="auto" aria-label="starsight syntax reference for matplotlib, seaborn, ggplot2, plotly users" viewBox="0 0 880 444"><title>starsight syntax reference for matplotlib, seaborn, ggplot2, plotly users</title><rect width="879" height="443" x=".5" y=".5" fill="#fff" stroke="#ccc" rx="12"/><path fill="#fff" d="M24 24h832v36H24z"/><text x="32" y="46" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">you wrote</text><text x="312" y="46" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">in starsight</text><text x="712" y="46" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">note</text><path stroke="#ccc" d="M24 60h832"/><text x="32" y="80" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.plot(x, y)  (matplotlib)</text><text x="312" y="80" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Figure::new(800, 600).add(LineMark::new(x, y))</text><text x="712" y="80" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">no global state</text><path fill="#fff" d="M24 90h832v30H24z"/><text x="32" y="110" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.scatter(x, y, c=c)</text><text x="312" y="110" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">PointMark::new(x, y).color_by(&amp;groups)</text><text x="712" y="110" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">builder pattern</text><text x="32" y="140" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.bar(labels, vals)</text><text x="312" y="140" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">BarMark::new(categories, values)</text><text x="712" y="140" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">grammar of graphics</text><path fill="#fff" d="M24 150h832v30H24z"/><text x="32" y="170" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.boxplot([a, b])</text><text x="312" y="170" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">BoxPlotMark::new(vec![BoxPlotGroup::new(&quot;a&quot;, a), …])</text><text x="712" y="170" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">label travels with data</text><text x="32" y="200" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">sns.violinplot(data=df, x=…, y=…)</text><text x="312" y="200" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">ViolinMark::new(groups).bandwidth(Bandwidth::Silverman)</text><text x="712" y="200" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">bandwidth is a builder</text><path fill="#fff" d="M24 210h832v30H24z"/><text x="32" y="230" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.pie(values, labels=…)</text><text x="312" y="230" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">PieMark::new(values, labels).show_percent()</text><text x="712" y="230" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">.inner_radius(0.5) → donut</text><text x="32" y="260" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">mpl_finance.candlestick_ohlc</text><text x="312" y="260" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">CandlestickMark::new(vec![Ohlc { … }, …])</text><text x="712" y="260" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">inline rows; no helper crate</text><path fill="#fff" d="M24 270h832v30H24z"/><text x="32" y="290" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.savefig(&quot;out.png&quot;)</text><text x="312" y="290" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">.save(&quot;out.png&quot;)?</text><text x="712" y="290" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">returns Result</text><text x="32" y="320" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plt.show()</text><text x="312" y="320" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">.show()?</text><text x="712" y="320" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">feature: interactive</text><path fill="#fff" d="M24 330h832v30H24z"/><text x="32" y="350" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">sns.heatmap(data)</text><text x="312" y="350" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">HeatmapMark::new(data)</text><text x="712" y="350" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">prismatica colormaps</text><text x="32" y="380" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">ggplot + geom_point()</text><text x="312" y="380" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Figure::new(W, H).add(PointMark::new(x, y))</text><text x="712" y="380" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">builder, not +</text><path fill="#fff" d="M24 390h832v30H24z"/><text x="32" y="410" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">px.scatter(df, x=&quot;a&quot;)  (plotly)</text><text x="312" y="410" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">plot!(df, x=&quot;a&quot;, y=&quot;b&quot;)</text><text x="712" y="410" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="13">feature: polars</text></svg>