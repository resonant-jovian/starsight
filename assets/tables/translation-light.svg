ace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">PieMark::new(values, labels).show_percent()</text><text x="724" y="237.5" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5">.inner_radius(0.5) →<tspan x="724" dy="16.5">donut</tspan></text><text x="32" y="282.5" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">mpl_finance.candlestick_ohlc</text><text x="292" y="282.5" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">CandlestickMark::new(vec![Ohlc { … }, …])</text><text x="724" y="282.5" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5">inline rows; no helper<tspan x="724" dy="16.5">crate</tspan></text><path fill="#fff" d="M24 309h872v28.5H24z"/><text x="32" y="327.5" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">plt.savefig(&quot;out.png&quot;)</text><text x="292" y="327.5" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">.save(&quot;out.png&quot;)?</text><text x="724" y="327.5" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5">returns Result</text><text x="32" y="356" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">plt.show()</text><text x="292" y="356" fill="#1a1a1a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">.show()?</text><text x="724" y="356" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif" font-size="12.5">feature: interactive</text><path fill="#fff" d="M24 366h872v28.5H24z"/><text x="32" y="384